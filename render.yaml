# Render Blueprint - Bulk Payouts (M-Pesa B2C via Daraja)
# Auto-deploys on every push to the default branch.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: bulk-payouts
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Set these in the Render Dashboard (never commit secrets):
      - key: DARAJA_ENVIRONMENT
        value: production
      - key: DARAJA_CONSUMER_KEY
        sync: false
      - key: DARAJA_CONSUMER_SECRET
        sync: false
      - key: DARAJA_SHORTCODE
        sync: false
      - key: DARAJA_INITIATOR_NAME
        sync: false
      - key: DARAJA_SECURITY_CREDENTIAL
        sync: false
      - key: DARAJA_COMMAND_ID
        value: BusinessPayment
      - key: DARAJA_RESULT_URL
        sync: false
      - key: DARAJA_TIMEOUT_URL
        sync: false
